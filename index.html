<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Gudi Padwa | Diet-o-Guide</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Marathi&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
         :root {
            --saffron: #FF9933;
            --maroon: #800000;
            --gold: #FFD700;
            --leaf-green: #2E7D32;
        }
        
        body {
            background: linear-gradient(135deg, #fff9e6 0%, #fceabb 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #333;
        }
        /* --- Gudi Animation CSS --- */
        
        .gudi-stage {
            position: relative;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: 50px;
        }
        
        .stick {
            width: 12px;
            height: 400px;
            background: #8B4513;
            border-radius: 10px;
            position: relative;
            transform: rotate(-10deg) translateY(100px);
            opacity: 0;
            animation: raiseStick 1.5s ease-out forwards;
        }
        
        .cloth {
            width: 140px;
            height: 220px;
            background: #d81b60;
            /* Silk Saree Red */
            border-right: 12px solid var(--gold);
            border-bottom: 12px solid var(--gold);
            position: absolute;
            top: 20px;
            left: -65px;
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            transform: scaleY(0);
            transform-origin: top;
            animation: unfoldCloth 1s ease-out 1.5s forwards;
        }
        
        .neem-leaves {
            position: absolute;
            top: 10px;
            left: -30px;
            font-size: 40px;
            opacity: 0;
            animation: fadeIn 0.8s forwards 2.2s;
        }
        
        .pot {
            width: 80px;
            height: 70px;
            background: linear-gradient(45deg, #ffd700, #b8860b);
            border-radius: 50% 50% 15% 15%;
            position: absolute;
            top: -45px;
            left: -35px;
            box-shadow: inset -5px -5px 10px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(-50px);
            animation: dropPot 0.8s cubic-bezier(0.47, 0, 0.745, 0.715) 2.8s forwards;
        }
        /* --- Text Styling --- */
        
        .main-title {
            font-family: 'Tiro Devanagari Marathi', serif;
            font-size: 4.5rem;
            color: var(--maroon);
            margin-bottom: 0;
            opacity: 0;
            animation: fadeInUp 1s forwards 3.5s;
        }
        
        .wish-text {
            font-size: 1.25rem;
            max-width: 600px;
            margin: 20px auto;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInUp 1s forwards 4s;
        }
        /* --- Animations --- */
        
        @keyframes raiseStick {
            to {
                transform: rotate(-10deg) translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes unfoldCloth {
            to {
                transform: scaleY(1);
            }
        }
        
        @keyframes dropPot {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        
        .celebrate-btn {
            background-color: var(--maroon);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: 0.3s;
            opacity: 0;
            animation: fadeIn 1s forwards 5s;
        }
        
        .celebrate-btn:hover {
            background-color: #a01010;
            transform: scale(1.05);
            color: white;
        }
        
        .footer-brand {
            margin-top: 50px;
            border-top: 1px solid #ddd;
            padding: 20px;
            font-weight: 600;
            color: var(--leaf-green);
        }
    </style>
</head>

<body>

    <div class="container text-center py-5">
        <!-- Logo Area -->
        <div class="mb-4">
            <h3 style="color: #2E7D32;">Diet-o-Guide</h3>
            <p class="text-muted small">Path to Health & Wellness</p>
        </div>

        <div class="row align-items-center">
            <!-- Left Side: Gudi Animation -->
            <div class="col-lg-5">
                <div class="gudi-stage">
                    <div class="stick">
                        <div class="cloth"></div>
                        <div class="neem-leaves">🍃🌼🍃</div>
                        <div class="pot"></div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Wishes -->
            <div class="col-lg-7">
                <h1 class="main-title">शुभ गुढीपाडवा</h1>
                <h2 class="text-secondary fw-light mb-4" style="opacity:0; animation: fadeIn 1s forwards 3.8s;">Happy Gudi Padwa</h2>

                <div class="wish-text">
                    <p>"May this auspicious occasion of Gudi Padwa bring you <strong>Health</strong>, <strong>Wealth</strong>, and <strong>Abundant Happiness</strong>. Start your new year with a commitment to a better and stronger version of yourself!"</p>
                </div>

                <button class="btn celebrate-btn shadow" onclick="launchCelebration()">
                    Celebrate the New Year 🎉
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-brand">
            www.dietoguide.in
        </div>
    </div>

    <script>
        // Confetti Celebration Function
        function launchCelebration() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: {
                        x: 0
                    },
                    colors: ['#FF9933', '#FFD700', '#800000']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: {
                        x: 1
                    },
                    colors: ['#FF9933', '#FFD700', '#2E7D32']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Auto-launch confetti after Gudi is assembled
        setTimeout(() => {
            launchCelebration();
        }, 4500);
    </script>

</body>

</html>
