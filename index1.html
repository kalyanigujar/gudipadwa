<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Gudi Padwa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
         :root {
            --primary: #ff6a00;
            --gold: #FFD700;
        }
        /* 🌄 BODY */
        
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 🎥 VIDEO BACKGROUND */
        
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -3;
        }
        /* 🌈 Overlay */
        
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: -2;
        }
        /* 🌿 Floating Leaves */
        
        .floating {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .leaf {
            position: absolute;
            font-size: 24px;
            animation: float 10s linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }
        /* 🔥 Glass UI */
        
        .glass {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }
        /* ✨ Title */
        
        .main-title {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #FFD700, #FF6A00);
            -webkit-background-clip: text;
            color: transparent;
            animation: fadeUp 1s ease;
        }
        /* 🧠 Typing */
        
        .typing {
            border-right: 3px solid white;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 4s steps(40, end) forwards, blink .7s infinite;
        }
        /* 🎉 Button */
        
        .btn-modern {
            background: linear-gradient(45deg, #ff6a00, #ffcc00);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            transition: 0.3s;
            margin-top: 20px;
        }
        
        .btn-modern:hover {
            transform: scale(1.1);
        }
        /* 🎞 Animations */
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes typing {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }
        
        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }
        /* 🎉 MODAL */
        
        .modal-custom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.4s;
        }
        
        .modal-custom.show {
            visibility: visible;
            opacity: 1;
        }
        
        .modal-box {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 20px;
            max-width: 350px;
            text-align: center;
            animation: zoomIn 0.5s ease;
        }
        
        .modal-img {
            width: 100%;
            border-radius: 15px;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 22px;
            cursor: pointer;
            color: white;
        }
        
        @keyframes zoomIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- 🎥 VIDEO BACKGROUND -->
    <video autoplay muted loop playsinline class="bg-video">
    <source src="C:\Users\admin\Downloads\axiom\Axiom\Axiom Programming\C Programming\.vscode\fastiwal\images\bc3b8fa5f32e5f5b3bedfaafb54b29a6.mp4" type="video/mp4">
</video>

    <div class="overlay"></div>

    <!-- 🌿 Floating Leaves -->
    <div class="floating">
        <div class="leaf" style="left:10%; animation-delay:0s;">🍃</div>
        <div class="leaf" style="left:30%; animation-delay:2s;">🌼</div>
        <div class="leaf" style="left:50%; animation-delay:4s;">🍃</div>
        <div class="leaf" style="left:70%; animation-delay:1s;">🌼</div>
        <div class="leaf" style="left:85%; animation-delay:3s;">🍃</div>
    </div>

    <!-- 🌟 MAIN CONTENT -->
    <div class="glass">
        <h1 class="main-title">🌸 शुभ गुढीपाडवा 🌸</h1>

        <h4 class="typing mt-3">
            Happy Gudi Padwa! New Beginning ✨
        </h4>

        <p class="mt-3">
            May this festival bring happiness, success and prosperity 💛
        </p>

        <button class="btn-modern" onclick="celebrate()">🎉 Celebrate</button>
    </div>

    <!-- 🎉 MODAL -->
    <div id="modal" class="modal-custom">
        <span class="close-btn" onclick="closeModal()">✖</span>

        <div class="modal-box">
            <img src="https://i.pinimg.com/736x/0a/5b/7f/0a5b7ff52b3a5d722b059b8f15947d78.jpg" class="modal-img">

            <h3 class="mt-3">🌸 Happy Gudi Padwa 🌸</h3>

            <p>
                May your life be filled with joy, success and positivity. Start your new year with happiness 💛✨
            </p>
        </div>
    </div>

    <!-- 🎊 Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        function celebrate() {

            // 🎊 Confetti
            var duration = 2 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: {
                        x: 0
                    }
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: {
                        x: 1
                    }
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            })();

            // 🎉 Open Modal
            document.getElementById("modal").classList.add("show");
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("show");
        }
    </script>

</body>

</html>
